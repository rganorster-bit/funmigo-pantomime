 <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>FUNMIGO פנטומימה</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.1);

}

h1{
color:#ff6600;
}

.phrase{
font-size:32px;
font-weight:bold;
margin:30px 0;
}
</style>

</head>

<body>

<div class="box">

<h1>🎭 פנטומימה</h1>

<div class="phrase" id="phrase"></div>

</div>

"ראש קטן",
"ראש גדול",
"יד ימין",
"אורח לרגע",
"סוף העולם שמאלה",
"לעוף על עצמך",
"לאכול את הכובע",
"להרים ידיים",
"לפתוח דף חדש",
"לשמור בבטן",
"לעמוד על שלך",
"לקפוץ למים",
"לשים רגל",
